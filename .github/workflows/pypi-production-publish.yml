name: SPIRA Trust Production PyPI Trusted Publishing

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-self-evidence-and-publish-pypi:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build public wheel
        run: |
          python tools/build_spira_trust_public.py dist/_wheel_build_pypi
          mkdir -p dist/publish dist/release-evidence
          cp dist/_wheel_build_pypi/wheelhouse/spira_trust-*.whl dist/publish/

      - name: Install built wheel
        run: |
          python -m pip install --no-index dist/publish/spira_trust-*.whl
          spira-trust version

      - name: Generate SPIRA self-evidence
        run: |
          WHEEL="$(ls dist/publish/spira_trust-*.whl | head -n 1)"
          python tools/build_spira_release_evidence.py \
            --wheel "$WHEEL" \
            --output-dir dist/release-evidence \
            --spira-command spira-trust \
            --verify-embedded-sboms

      - name: Run previous public version gate
        run: |
          WHEEL="$(ls dist/publish/spira_trust-*.whl | head -n 1)"
          set +e
          python tools/run_previous_version_gate.py \
            --candidate-wheel "$WHEEL" \
            --output-dir dist/release-evidence/previous-version-gate \
            --verify-embedded-sboms
          GATE_EXIT="$?"
          set -e
          cp dist/release-evidence/previous-version-gate/previous_version_gate.json \
            dist/release-evidence/previous_version_gate.json
          exit "$GATE_EXIT"

      - name: Prepare release evidence assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ -f dist/release-evidence/graph/agent_summary.json ]; then
            cp dist/release-evidence/graph/agent_summary.json dist/release-evidence/agent_summary.json
          fi
          (
            cd dist/publish
            sha256sum spira_trust-*.whl
          ) > dist/release-evidence/SHA256SUMS.txt
          (
            cd dist/release-evidence
            sha256sum spira-release-evidence.zip
          ) >> dist/release-evidence/SHA256SUMS.txt
          {
            echo "SPIRA Trust ${GITHUB_REF_NAME#v}"
            echo
            echo "Release evidence assets are attached to this GitHub Release."
            echo
            echo "The release candidate was checked by the candidate SPIRA version and by"
            echo "the previous public SPIRA version selected from PyPI with a pinned hash."
            echo
            echo "This release evidence is a transparency ritual, not an independent"
            echo "security audit."
          } > dist/release-evidence/release_notes.md

      - name: Upload release evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spira-production-release-evidence
          path: |
            dist/release-evidence/**
          if-no-files-found: warn

      - name: Attach evidence to draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS=(
            "dist/release-evidence/spira-release-evidence.zip"
            "dist/release-evidence/release_self_evidence_manifest.json"
            "dist/release-evidence/previous_version_gate.json"
            "dist/release-evidence/SHA256SUMS.txt"
          )
          if [ -f dist/release-evidence/agent_summary.json ]; then
            ASSETS+=("dist/release-evidence/agent_summary.json")
          fi
          gh release create "$GITHUB_REF_NAME" "${ASSETS[@]}" \
            --draft \
            --latest \
            --verify-tag \
            --title "SPIRA Trust ${GITHUB_REF_NAME#v}" \
            --notes-file dist/release-evidence/release_notes.md

      - name: Publish package distributions to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/publish

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest
