name: SPIRA Trust Production PyPI Trusted Publishing

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-self-evidence-and-publish-pypi:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release workflow tooling
        run: python -m pip install packaging

      - name: Build public wheel
        run: |
          python tools/build_spira_trust_public.py dist/_wheel_build_pypi
          mkdir -p dist/publish dist/release-evidence
          cp dist/_wheel_build_pypi/wheelhouse/spira_trust-*.whl dist/publish/

      - name: Verify tag version matches wheel version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path
          from packaging.version import InvalidVersion, Version

          wheels = sorted(Path("dist/publish").glob("spira_trust-*.whl"))
          if len(wheels) != 1:
              print(f"expected exactly one spira_trust wheel, found {len(wheels)}", file=sys.stderr)
              for wheel in wheels:
                  print(f"  {wheel}", file=sys.stderr)
              sys.exit(1)

          wheel = wheels[0]
          match = re.match(r"^spira_trust-(?P<version>[^-]+)-", wheel.name)
          if not match:
              print(f"could not parse version from wheel filename: {wheel.name}", file=sys.stderr)
              sys.exit(1)

          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          if not ref_name.startswith("v"):
              print(f"tag does not start with v: {ref_name}", file=sys.stderr)
              sys.exit(1)

          raw_tag_version = ref_name[1:]
          raw_wheel_version = match.group("version")

          try:
              tag_version = Version(raw_tag_version)
              wheel_version = Version(raw_wheel_version)
          except InvalidVersion as error:
              print(f"invalid PEP 440 version: {error}", file=sys.stderr)
              sys.exit(1)

          if tag_version != wheel_version:
              print(
                  f"tag version {tag_version} does not match wheel version {wheel_version} "
                  f"from {wheel.name}",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"tag version matches wheel version: {tag_version}")
          PY

      - name: Install built wheel
        run: |
          python -m pip install --no-index dist/publish/spira_trust-*.whl
          spira-trust version

      - name: Generate SPIRA self-evidence
        run: |
          WHEEL="$(ls dist/publish/spira_trust-*.whl | head -n 1)"
          python tools/build_spira_release_evidence.py \
            --wheel "$WHEEL" \
            --output-dir dist/release-evidence \
            --spira-command spira-trust \
            --verify-embedded-sboms

      - name: Guard release agent summary size
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          limit = 4 * 1024
          candidates = list(Path("dist/release-evidence").rglob("agent_summary.json"))

          if not candidates:
              print("ERROR: agent_summary.json not found in release evidence", file=sys.stderr)
              sys.exit(1)

          for path in candidates:
              size = path.stat().st_size
              print(f"{path}: {size} bytes")
              if size > limit:
                  print(
                      f"ERROR: {path} is {size} bytes; release self-check agent_summary limit is {limit} bytes",
                      file=sys.stderr,
                  )
                  sys.exit(1)

          print(f"agent_summary size guard passed: <= {limit} bytes")
          PY

      - name: Run previous public version gate
        run: |
          WHEEL="$(ls dist/publish/spira_trust-*.whl | head -n 1)"
          set +e
          python tools/run_previous_version_gate.py \
            --candidate-wheel "$WHEEL" \
            --output-dir dist/release-evidence/previous-version-gate \
            --verify-embedded-sboms
          GATE_EXIT="$?"
          set -e
          cp dist/release-evidence/previous-version-gate/previous_version_gate.json \
            dist/release-evidence/previous_version_gate.json
          exit "$GATE_EXIT"

      - name: Prepare release evidence assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ -f dist/release-evidence/graph/agent_summary.json ]; then
            cp dist/release-evidence/graph/agent_summary.json dist/release-evidence/agent_summary.json
          fi
          (
            cd dist/release-evidence
            zip -r previous-version-gate.zip previous-version-gate
          )
          (
            cd dist/publish
            sha256sum spira_trust-*.whl
          ) > dist/release-evidence/SHA256SUMS.txt
          (
            cd dist/release-evidence
            sha256sum spira-release-evidence.zip \
              previous-version-gate.zip \
              release_self_evidence_manifest.json \
              previous_version_gate.json
          ) >> dist/release-evidence/SHA256SUMS.txt
          {
            echo "SPIRA Trust ${GITHUB_REF_NAME#v}"
            echo
            echo "## Nesira Phase 2 Read-Only Assessment Surface"
            echo
            echo "This release includes an opt-in Nesira Phase 2 read-only assessment"
            echo "surface in the public wheel."
            echo
            echo "Existing spira-trust functionality is unchanged. This release adds only"
            echo "the opt-in assessment surface described here."
            echo
            echo "The surface checks declared trust evidence against declared trust roots and"
            echo "composes the result through a verified fail-closed composition core,"
            echo "conditional on the declared trust roots and recorded NOT_PROVEN assumptions."
            echo "It emits an assessment artifact only."
            echo
            echo "Included surface:"
            echo
            echo "- spira_core/nesira_phase2_assessment_wiring.py"
            echo "- spira_core/nesira_phase2_authority_adapter.py"
            echo "- spira_core/nesira_phase2_identity_adapter.py"
            echo "- spira_core/nesira_phase2_isolation_attestation_adapter.py"
            echo "- spira_core/nesira_phase2_read_only_assessment_cli.py"
            echo "- spira_core/nesira_phase2_signature_adapter.py"
            echo
            echo "The Nesira assessment surface is opt-in. The base package dependencies remain"
            echo "empty. The crypto dependency is available only through the nesira-assessment"
            echo "optional extra:"
            echo
            echo "- cryptography==49.0.0"
            echo
            echo "Boundary:"
            echo
            echo "This is assessment-only."
            echo
            echo "It is not execution, not severance authorization, not permission to proceed,"
            echo "not proof that isolation happened, not proof that trust roots are absolutely"
            echo "legitimate, not combined verdict integration, and not runner behavior."
            echo
            echo "External reproduction means the recorded checks were reproduced from a fresh"
            echo "clone. It does not mean independent certification, audit, endorsement,"
            echo "third-party validation, or a security or trust guarantee."
            echo
            echo "## Release Evidence"
            echo
            echo "Release evidence assets are attached to this GitHub Release."
            echo
            echo "The release candidate was checked by the candidate SPIRA version and by"
            echo "the previous public SPIRA version selected from PyPI with a pinned hash."
            echo
            echo "This release evidence is a transparency ritual, not an independent"
            echo "security audit."
          } > dist/release-evidence/release_notes.md

      - name: Upload release evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spira-production-release-evidence
          path: |
            dist/release-evidence/**
          if-no-files-found: warn

      - name: Attach evidence to draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS=(
            "dist/release-evidence/spira-release-evidence.zip"
            "dist/release-evidence/release_self_evidence_manifest.json"
            "dist/release-evidence/previous_version_gate.json"
            "dist/release-evidence/previous-version-gate.zip"
            "dist/release-evidence/SHA256SUMS.txt"
          )
          if [ -f dist/release-evidence/agent_summary.json ]; then
            ASSETS+=("dist/release-evidence/agent_summary.json")
          fi
          gh release create "$GITHUB_REF_NAME" "${ASSETS[@]}" \
            --draft \
            --latest \
            --verify-tag \
            --title "SPIRA Trust ${GITHUB_REF_NAME#v}" \
            --notes-file dist/release-evidence/release_notes.md

      - name: Publish package distributions to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/publish

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest
